<!DOCTYPE html>
<html lang="es" class="tui-bg-blue-black">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Mis Finanzas</title>
  <link rel="stylesheet" href="https://unpkg.com/tuicss@2.1.2/dist/tuicss.min.css">
  <style>
    body { background-color: transparent !important; }
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      border: 1px solid #2e5a7a;
      background: #040c12;
      padding: 32px 36px 28px;
      width: 100%;
      max-width: 320px;
    }
    .login-box fieldset {
      border: 1px solid #1a3a4e;
      padding: 16px 18px 18px;
      margin-top: 10px;
    }
    .login-box legend {
      color: #44ccff;
      font-weight: bold;
      padding: 0 6px;
    }
    .pin-inputs {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 16px 0 20px;
    }
    .pin-inputs input {
      width: 48px;
      height: 52px;
      text-align: center;
      font-size: 22px;
      font-family: monospace;
      background: #071520;
      border: 1px solid #2e5a7a;
      color: #44ccff;
      caret-color: transparent;
    }
    .pin-inputs input:focus {
      outline: none;
      border-color: #44ccff;
      background: #0a1e2e;
    }
    .error-msg {
      color: #ff6666;
      font-size: 12px;
      text-align: center;
      margin-bottom: 14px;
    }
    .title-line {
      text-align: center;
      color: #cce6ee;
      font-size: 13px;
      letter-spacing: .08em;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <p class="title-line">MIS FINANZAS PERSONALES</p>
      <fieldset>
        <legend>Verificación</legend>
        {% if error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}
        <form method="POST" action="/login" id="pin-form">
          <div class="pin-inputs">
            <input type="password" inputmode="numeric" maxlength="1" class="pin-digit" autofocus autocomplete="off">
            <input type="password" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
            <input type="password" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
            <input type="password" inputmode="numeric" maxlength="1" class="pin-digit" autocomplete="off">
          </div>
          <input type="hidden" name="pin" id="pin-hidden">
          <div style="text-align:center">
            <button type="submit" class="tui-button cyan-168 white-text">Ingresar</button>
          </div>
        </form>
      </fieldset>
    </div>
  </div>

  <script src="https://unpkg.com/tuicss@2.1.2/dist/tuicss.min.js"></script>
  <script>
    const digits = document.querySelectorAll('.pin-digit');
    const hidden = document.getElementById('pin-hidden');
    const form   = document.getElementById('pin-form');

    digits.forEach((inp, i) => {
      inp.addEventListener('input', () => {
        // Solo aceptar dígitos
        inp.value = inp.value.replace(/\D/g, '').slice(-1);
        if (inp.value && i < digits.length - 1) digits[i + 1].focus();
        syncHidden();
        if ([...digits].every(d => d.value)) form.requestSubmit();
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !inp.value && i > 0) {
          digits[i - 1].value = '';
          digits[i - 1].focus();
          syncHidden();
        }
      });
    });

    function syncHidden() {
      hidden.value = [...digits].map(d => d.value).join('');
    }
  </script>
</body>
</html>
