<!DOCTYPE html>
<html lang="es" class="tui-bg-blue-black">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Finanzas Personales</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23040c12'/><rect x='1.5' y='1.5' width='29' height='29' rx='3' fill='none' stroke='%232e5a7a' stroke-width='2'/><line x1='16' y1='6' x2='16' y2='10' stroke='%2344ccff' stroke-width='2' stroke-linecap='round'/><line x1='16' y1='22' x2='16' y2='26' stroke='%2344ccff' stroke-width='2' stroke-linecap='round'/><path d='M20 10h-6a3 3 0 0 0 0 6h4a3 3 0 0 1 0 6h-6' fill='none' stroke='%2344ccff' stroke-width='2.2' stroke-linecap='round'/></svg>">
  <link rel="stylesheet" href="https://unpkg.com/tuicss@2.1.2/dist/tuicss.min.css">
  <style>
    .positive { color: #00ff00; }
    .negative { color: #ff5555; }
    .tui-statusbar { position: fixed !important; bottom: 0; left: 0; right: 0; z-index: 1000; }
    .app-content { padding: 28px 16px 44px; min-height: calc(100vh - 56px); }
    /* Evitar fondos blancos de TuiCSS en tablas y ventanas (excepto dashboard y credit cards) */
    .tui-table:not(#dashboard-table):not(.cc-detail-table) td,
    .tui-table:not(#dashboard-table):not(.cc-detail-table) th { background-color: transparent !important; }
    .tui-window { background-color: transparent !important; }
    body { background-color: transparent !important; }
    /* ── Sidenav mobile ──────────────────────────────────── */
    .tui-sidenav-button { display: none !important; cursor: pointer; }
    @media (max-width: 640px) {
      .nav-links { display: none !important; }
      .tui-sidenav-button { display: list-item !important; }
    }
  </style>
</head>
<body>
  <nav class="tui-sidenav left" id="sidenav">
    <ul>
      <li><a href="/dashboard" class="{{ 'tui-active' if request.path in ('/', '/dashboard') else '' }}"><span class="red-168-text">D</span>ashboard</a></li>
      <li><a href="/transactions" class="{{ 'tui-active' if request.path == '/transactions' else '' }}"><span class="red-168-text">T</span>ransacciones</a></li>
      <li><a href="/upload" class="{{ 'tui-active' if request.path == '/upload' else '' }}"><span class="red-168-text">S</span>ubir archivos</a></li>
      <li><a href="/credit-cards" class="{{ 'tui-active' if request.path == '/credit-cards' else '' }}">Tar<span class="red-168-text">j</span>etas</a></li>
    </ul>
  </nav>
  <nav class="tui-nav">
    <span class="tui-datetime" data-format="h:m:s a"></span>
    <ul class="nav-links">
      <li><a href="/dashboard" class="{{ 'tui-active' if request.path in ('/', '/dashboard') else '' }}"><span class="red-168-text">D</span>ashboard</a></li>
      <li><a href="/transactions" class="{{ 'tui-active' if request.path == '/transactions' else '' }}"><span class="red-168-text">T</span>ransacciones</a></li>
      <li><a href="/upload" class="{{ 'tui-active' if request.path == '/upload' else '' }}"><span class="red-168-text">S</span>ubir archivos</a></li>
      <li><a href="/credit-cards" class="{{ 'tui-active' if request.path == '/credit-cards' else '' }}">Tar<span class="red-168-text">j</span>etas</a></li>
    </ul>
    <ul>
      <li class="tui-sidenav-button">&#9776;</li>
    </ul>
  </nav>

  <div class="app-content">
    {% block content %}{% endblock %}
  </div>

  <div class="tui-statusbar">
    <ul>
      <li><span class="white-255-text">Mis Finanzas Personales</span></li>
    </ul>
  </div>

  <script src="https://unpkg.com/tuicss@2.1.2/dist/tuicss.min.js"></script>
  <script>
    document.addEventListener('click', function(e) {
      const nav = document.getElementById('sidenav');
      if (nav.classList.contains('active') &&
          !nav.contains(e.target) &&
          !e.target.closest('.tui-sidenav-button')) {
        nav.classList.remove('active');
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
