{% extends "base.html" %}

{% block content %}

<div id="loading" class="flex items-center gap-3 p-6 text-base-content/60">
  <span class="loading loading-spinner loading-md text-primary"></span>
  <span class="text-sm">Cargando tarjetas...</span>
</div>

<div id="error" class="alert alert-error text-sm" style="display:none">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M12 3a9 9 0 100 18A9 9 0 0012 3z"/></svg>
  <span id="error-msg"></span>
</div>

<div id="empty" class="alert text-sm" style="display:none">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>
  <span>No hay gastos con tarjeta de crédito. Importá tu resumen desde <a href="/upload" class="link link-primary">Subir archivos</a>.</span>
</div>

<div id="cards-container" class="flex flex-col gap-4"></div>
{% endblock %}

{% block scripts %}
<script>
  const fmt = n => '$ ' + Number(n).toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  function formatMonth(ym) {
    if (!ym) return '—';
    const [year, m] = ym.split('-');
    const names = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return names[parseInt(m, 10) - 1] + ' ' + year;
  }

  fetch('/api/transactions/credit-card-summary')
    .then(r => r.json())
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      if (data.cards.length === 0) {
        document.getElementById('empty').style.display = '';
        return;
      }
      const container = document.getElementById('cards-container');
      data.cards.forEach(card => {
        const rows = card.items.map(row =>
          '<tr>' +
          '<td class="text-sm">' + row.description + '</td>' +
          '<td class="text-right text-sm">' + fmt(row.monthly_amount) + '</td>' +
          '<td class="text-center text-sm text-base-content/50">' + row.installment_current + ' / ' + row.installment_total + '</td>' +
          '<td class="text-center text-sm text-base-content/50 hidden sm:table-cell">' + row.pending_installments + '</td>' +
          '<td class="text-right text-sm text-error hidden sm:table-cell">' + fmt(row.remaining_debt) + '</td>' +
          '<td class="text-right text-sm text-base-content/50 hidden md:table-cell">' + fmt(row.total_debt) + '</td>' +
          '<td class="text-center text-sm text-success hidden md:table-cell">' + formatMonth(row.payoff_month) + '</td>' +
          '</tr>'
        ).join('');

        const div = document.createElement('div');
        div.className = 'card bg-base-200 shadow';
        div.innerHTML =
          '<div class="card-body">' +
            '<div class="flex items-baseline gap-3 mb-2">' +
              '<h2 class="card-title text-primary">' + card.card + '</h2>' +
              '<span class="text-xs text-base-content/40 uppercase tracking-widest">' + card.card_network + '</span>' +
            '</div>' +
            '<div class="stats bg-base-300 shadow flex-wrap w-full">' +
              '<div class="stat py-3 px-4">' +
                '<div class="stat-title text-xs">Cuota mensual</div>' +
                '<div class="stat-value text-base text-error">' + fmt(card.total_monthly) + '</div>' +
              '</div>' +
              '<div class="stat py-3 px-4">' +
                '<div class="stat-title text-xs">Deuda restante</div>' +
                '<div class="stat-value text-base text-error">' + fmt(card.total_remaining_debt) + '</div>' +
              '</div>' +
              '<div class="stat py-3 px-4">' +
                '<div class="stat-title text-xs">Deuda total</div>' +
                '<div class="stat-value text-base">' + fmt(card.total_debt) + '</div>' +
              '</div>' +
              '<div class="stat py-3 px-4">' +
                '<div class="stat-title text-xs">Se salda en</div>' +
                '<div class="stat-value text-base text-success">' + formatMonth(card.payoff_month) + '</div>' +
              '</div>' +
            '</div>' +
            '<details class="collapse collapse-arrow bg-base-300 mt-3">' +
              '<summary class="collapse-title text-sm font-medium min-h-0 py-3">Ver detalle (' + card.items.length + ' movimientos)</summary>' +
              '<div class="collapse-content">' +
                '<div class="overflow-x-auto">' +
                  '<table class="table table-xs">' +
                    '<thead><tr>' +
                      '<th>Descripción</th>' +
                      '<th class="text-right">Cuota</th>' +
                      '<th class="text-center">Cuotas</th>' +
                      '<th class="text-center hidden sm:table-cell">Pend.</th>' +
                      '<th class="text-right hidden sm:table-cell">Saldo</th>' +
                      '<th class="text-right hidden md:table-cell">Total</th>' +
                      '<th class="text-center hidden md:table-cell">Se salda</th>' +
                    '</tr></thead>' +
                    '<tbody>' + rows + '</tbody>' +
                  '</table>' +
                '</div>' +
              '</div>' +
            '</details>' +
          '</div>' +
        '</div>';
        container.appendChild(div);
      });
    })
    .catch(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').textContent = 'Error al cargar el resumen de tarjetas.';
      document.getElementById('error').style.display = '';
    });
</script>
{% endblock %}
