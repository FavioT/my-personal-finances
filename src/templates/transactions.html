{% extends "base.html" %}

{% block content %}

<div id="loading" class="flex items-center gap-3 p-6 text-base-content/60">
  <span class="loading loading-spinner loading-md text-primary"></span>
  <span class="text-sm">Cargando transacciones...</span>
</div>

<div id="error" class="alert alert-error text-sm" style="display:none">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M12 3a9 9 0 100 18A9 9 0 0012 3z"/></svg>
  <span id="error-msg"></span>
</div>

<div id="empty" class="alert text-sm" style="display:none">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>
  <span>Sin transacciones. <a href="/upload" class="link link-primary">Subí un archivo</a> para importar.</span>
</div>

<div id="table-container" class="card bg-base-200 shadow" style="display:none">
  <div class="card-body p-4">
    <h2 id="table-legend" class="card-title text-primary text-sm">Transacciones</h2>
    <div class="overflow-x-auto">
      <table class="table table-sm table-zebra">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Descripción</th>
            <th class="text-right">Monto</th>
            <th>Moneda</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const fmt = n => Number(n).toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  fetch('/api/transactions')
    .then(r => r.json())
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      if (data.length === 0) {
        document.getElementById('empty').style.display = '';
        return;
      }
      document.getElementById('table-legend').textContent = 'Transacciones (' + data.length + ')';
      const tbody = document.getElementById('table-body');
      data.forEach(t => {
        const tr = document.createElement('tr');
        tr.id = 'row-' + t.id;
        const amtClass = t.amount > 0 ? 'positive' : 'negative';
        tr.innerHTML =
          '<td>' + t.date + '</td>' +
          '<td>' + t.description + '</td>' +
          '<td class="text-right ' + amtClass + '">' + fmt(t.amount) + '</td>' +
          '<td>' + t.currency + '</td>';
        tbody.appendChild(tr);
      });
      document.getElementById('table-container').style.display = '';
    })
    .catch(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').textContent = 'No se pudo conectar al servidor.';
      document.getElementById('error').style.display = '';
    });
</script>
{% endblock %}
