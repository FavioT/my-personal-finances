<div class="transactions-container">
  <h1>Transactions</h1>

  <div *ngIf="loading" class="loading">
    <mat-spinner></mat-spinner>
  </div>

  <div *ngIf="error" class="error-message">
    <mat-card>
      <mat-card-content>{{ error }}</mat-card-content>
    </mat-card>
  </div>

  <ng-container *ngIf="!loading && !error">
    <div *ngIf="transactions.length === 0" class="empty-state">
      <mat-card>
        <mat-card-content>
          <p>No transactions found. <a routerLink="/upload">Upload a file</a> to import transactions.</p>
        </mat-card-content>
      </mat-card>
    </div>

    <table mat-table [dataSource]="transactions" class="mat-elevation-z2" *ngIf="transactions.length > 0">
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let t">{{ t.date }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let t">{{ t.description }}</td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let t" [class.positive]="t.amount > 0" [class.negative]="t.amount < 0">
          {{ t.amount | number:'1.2-2' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="currency">
        <th mat-header-cell *matHeaderCellDef>Currency</th>
        <td mat-cell *matCellDef="let t">{{ t.currency }}</td>
      </ng-container>

      <ng-container matColumnDef="source_type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let t">{{ t.source_type | uppercase }}</td>
      </ng-container>

      <ng-container matColumnDef="source">
        <th mat-header-cell *matHeaderCellDef>Source File</th>
        <td mat-cell *matCellDef="let t">{{ t.source }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let t">
          <button mat-icon-button color="warn" (click)="deleteTransaction(t.id)" aria-label="Delete transaction">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </ng-container>
</div>
