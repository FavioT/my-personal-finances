<div class="dashboard-container">
  <h1>Dashboard</h1>

  <div *ngIf="loading" class="loading">
    <mat-spinner></mat-spinner>
  </div>

  <div *ngIf="error" class="error-message">
    <mat-card>
      <mat-card-content>{{ error }}</mat-card-content>
    </mat-card>
  </div>

  <ng-container *ngIf="!loading && !error">
    <div class="summary-cards" *ngIf="summary">
      <mat-card class="summary-card income">
        <mat-card-header>
          <mat-card-title>Total Income</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p class="amount positive">{{ summary.total_income | number:'1.2-2' }}</p>
        </mat-card-content>
      </mat-card>

      <mat-card class="summary-card expenses">
        <mat-card-header>
          <mat-card-title>Total Expenses</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p class="amount negative">{{ summary.total_expenses | number:'1.2-2' }}</p>
        </mat-card-content>
      </mat-card>

      <mat-card class="summary-card balance">
        <mat-card-header>
          <mat-card-title>Balance</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p class="amount" [class.positive]="summary.balance >= 0" [class.negative]="summary.balance < 0">
            {{ summary.balance | number:'1.2-2' }}
          </p>
        </mat-card-content>
      </mat-card>
    </div>

    <div class="chart-container" *ngIf="summary && (summary.total_income > 0 || summary.total_expenses < 0)">
      <mat-card>
        <mat-card-header>
          <mat-card-title>Income vs Expenses</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <canvas baseChart [data]="pieChartData" [type]="pieChartType"></canvas>
        </mat-card-content>
      </mat-card>
    </div>

    <div class="empty-state" *ngIf="summary && summary.total_income === 0 && summary.total_expenses === 0">
      <mat-card>
        <mat-card-content>
          <p>No transactions found. <a routerLink="/upload">Upload your first file</a> to get started.</p>
        </mat-card-content>
      </mat-card>
    </div>
  </ng-container>
</div>
