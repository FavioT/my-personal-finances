{% extends "base.html" %}

{% block content %}
<div id="loading" class="tui-window full-width" style="padding:12px">
  <div class="tui-progress-bar tui-indeterminate"></div>
</div>

<div id="error" class="tui-window full-width" style="padding:12px;display:none;border-color:#ff5555">
  <p class="red-255-text" id="error-msg"></p>
</div>

<div id="empty" class="tui-window full-width" style="padding:16px;display:none">
  <p class="white-text">No hay gastos con tarjeta de crédito. Importá tu resumen desde <a href="/upload" class="cyan-255-text">Subir archivos</a>.</p>
</div>

<div id="cards-container"></div>
{% endblock %}

{% block scripts %}
<script>
  const fmt = n => '$ ' + Number(n).toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

  function formatMonth(ym) {
    if (!ym) return '-';
    const [year, m] = ym.split('-');
    const names = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return names[parseInt(m, 10) - 1] + ' ' + year;
  }

  fetch('/api/transactions/credit-card-summary')
    .then(r => r.json())
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      if (data.cards.length === 0) {
        document.getElementById('empty').style.display = '';
        return;
      }
      const container = document.getElementById('cards-container');
      data.cards.forEach(card => {
        const rows = card.items.map(row =>
          '<tr>' +
          '<td class="white-text">' + row.description + '</td>' +
          '<td class="white-text" style="text-align:right">' + fmt(row.monthly_amount) + '</td>' +
          '<td class="white-text" style="text-align:center">' + row.installment_current + ' / ' + row.installment_total + '</td>' +
          '<td class="white-text" style="text-align:center">' + row.pending_installments + '</td>' +
          '<td class="red-255-text" style="text-align:right">' + fmt(row.remaining_debt) + '</td>' +
          '<td class="white-text" style="text-align:right">' + fmt(row.total_debt) + '</td>' +
          '<td class="cyan-255-text" style="text-align:center">' + formatMonth(row.payoff_month) + '</td>' +
          '</tr>'
        ).join('');

        const div = document.createElement('div');
        div.className = 'tui-window full-width';
        div.style.cssText = 'padding:12px;margin-bottom:20px';
        div.innerHTML =
          '<fieldset class="tui-fieldset">' +
          '<legend class="cyan-255-text"><b>' + card.card + '</b> &mdash; ' + card.card_network + '</legend>' +
          '<div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:12px">' +
            '<div><div class="white-255-text" style="font-size:0.75em">Cuota mensual</div><div class="red-255-text"><b>' + fmt(card.total_monthly) + '</b></div></div>' +
            '<div><div class="white-255-text" style="font-size:0.75em">Deuda restante</div><div class="red-255-text"><b>' + fmt(card.total_remaining_debt) + '</b></div></div>' +
            '<div><div class="white-255-text" style="font-size:0.75em">Deuda total</div><div class="white-text"><b>' + fmt(card.total_debt) + '</b></div></div>' +
            '<div><div class="white-255-text" style="font-size:0.75em">Se salda en</div><div class="cyan-255-text"><b>' + formatMonth(card.payoff_month) + '</b></div></div>' +
          '</div>' +
          '<details>' +
          '<summary class="white-text" style="cursor:pointer;margin-bottom:8px">Ver detalle (' + card.items.length + ' movimientos)</summary>' +
          '<table class="tui-table hovered-cyan" style="width:100%">' +
          '<thead><tr>' +
          '<th class="white-255-text">Descripción</th>' +
          '<th class="white-255-text" style="text-align:right">Cuota</th>' +
          '<th class="white-255-text" style="text-align:center">Cuotas</th>' +
          '<th class="white-255-text" style="text-align:center">Pend.</th>' +
          '<th class="white-255-text" style="text-align:right">Saldo</th>' +
          '<th class="white-255-text" style="text-align:right">Total</th>' +
          '<th class="white-255-text" style="text-align:center">Se salda</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
          '</table>' +
          '</details>' +
          '</fieldset>';
        container.appendChild(div);
      });
    })
    .catch(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').textContent = 'Error al cargar el resumen de tarjetas.';
      document.getElementById('error').style.display = '';
    });
</script>
{% endblock %}
